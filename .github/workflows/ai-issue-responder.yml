- name: Generate AI Response
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          USER_PROFILE: ${{ steps.profile.outputs.content }}
        run: |
          # プロンプト作成
          PROMPT="あなたは以下のプロフィールを持つ萬俵秀俊さんのAIアシスタントです。陽気に挨拶し、Issueを要約してください。
          プロフィール: $USER_PROFILE
          Issueタイトル: $ISSUE_TITLE
          Issue本文: $ISSUE_BODY"

          # API呼び出し
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"contents\": [{
                \"parts\":[{\"text\": $(echo "$PROMPT" | jq -Rs .)}]
              }]
            }")

          # 回答を抽出
          ANSWER=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')

          # 【重要】ここを以下の形式に修正してください！
          echo "answer<<EOF" >> $GITHUB_OUTPUT
          echo "$ANSWER" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
