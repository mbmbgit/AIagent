name: Run Python Program  # ワークフロー名

on:
  push:  # masterブランチへのpushをトリガーとする
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest  # 実行環境を指定

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4  # リポジトリのコードをチェックアウトする

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  # 使用するPythonのバージョンを指定

    - name: Install dependencies
      run: |
        # プログラムに必要なライブラリがあればここでインストール
        # 例: pip install requests
        echo "No dependencies to install."

    - name: Run Python script
      run: |
        python hello.py  # Pythonスクリプトを実行